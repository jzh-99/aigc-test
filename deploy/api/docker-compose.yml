name: aigc-api

# ============================================================
# API 服务器：Fastify 后端
# 依赖基础设施服务器，通过 INFRA_HOST 访问
# ============================================================

services:
  api:
    image: aigc-api:latest
    container_name: aigc-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # 覆盖为基础设施服务器的真实地址
      DATABASE_URL: postgresql://${POSTGRES_USER:-aigc}:${POSTGRES_PASSWORD}@${INFRA_HOST}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-aigc_dev}
      REDIS_URL: redis://${REDIS_PASSWORD:+:${REDIS_PASSWORD}@}${INFRA_HOST}:${REDIS_PORT:-6379}
      TOS_ACCESS_KEY_ID: ${TOS_ACCESS_KEY_ID}
      TOS_SECRET_ACCESS_KEY: ${TOS_SECRET_ACCESS_KEY}
      TOS_REGION: ${TOS_REGION:-cn-shanghai}
      TOS_ENDPOINT: ${TOS_ENDPOINT:-tos-cn-shanghai.volces.com}
      TOS_BUCKET: ${TOS_BUCKET:-toby-ai-prod}
      TOS_PUBLIC_URL: ${TOS_PUBLIC_URL}
      API_PORT: "7001"
      API_HOST: "0.0.0.0"
      NODE_ENV: production
      LOG_DIR: /app/logs/api
    volumes:
      - ./logs:/app/logs/api      # 日志持久化到宿主机 deploy/api/logs/
    ports:
      - "${API_PORT:-7001}:7001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7001/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
